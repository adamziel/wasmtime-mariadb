name: release assets

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.2
        required: true
        type: string

permissions:
  contents: write

jobs:
  linux-x86_64:
    name: Build linux-x86_64
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Download MariaDB wasm release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p release-input
          gh release download "${{ inputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "mariadbd-wasm.tar.gz" \
            --dir release-input
          tar -xzf release-input/mariadbd-wasm.tar.gz -C release-input

      - name: Build Wasmtime runner
        run: |
          MARIADBD_WASM="$PWD/release-input/mariadbd" \
            cargo build --release

      - name: Install MariaDB client
        run: |
          sudo apt-get update
          sudo apt-get install -y mariadb-client

      - name: Smoke test server over TCP
        run: |
          set -euo pipefail
          dump_logs() {
            echo "::group::mariadbd-runtime.err"
            cat "$RUN_DIR/mariadbd-runtime.err" 2>/dev/null || true
            echo "::endgroup::"
            echo "::group::server.stderr"
            cat "$RUNNER_TEMP/server.stderr" 2>/dev/null || true
            echo "::endgroup::"
            echo "::group::server.stdout"
            cat "$RUNNER_TEMP/server.stdout" 2>/dev/null || true
            echo "::endgroup::"
          }
          export BIN="$PWD/target/release/wasmtime-mariadb"
          export RUN_DIR="$RUNNER_TEMP/wasmtime-mariadb-run"
          export PORT=3320
          export WASMTIME_MARIADB_SOCKET_TRACE=1
          ./scripts/run-server.sh >"$RUNNER_TEMP/server.stdout" 2>"$RUNNER_TEMP/server.stderr" &
          server_pid=$!
          cleanup() {
            kill "$server_pid" 2>/dev/null || true
            wait "$server_pid" 2>/dev/null || true
          }
          trap cleanup EXIT
          for i in $(seq 1 60); do
            if grep -q 'ready for connections' "$RUN_DIR/mariadbd-runtime.err" 2>/dev/null; then
              break
            fi
            if ! kill -0 "$server_pid" 2>/dev/null; then
              dump_logs
              exit 1
            fi
            sleep 1
          done
          grep -q 'ready for connections' "$RUN_DIR/mariadbd-runtime.err"
          python3 scripts/bench-tcp.py --host 127.0.0.1 --port "$PORT" --user root --clients 1 --rows 5 --batch-size 5 || {
            dump_logs
            exit 1
          }
          MYSQL=mariadb PORT="$PORT" ./scripts/test-mysql-client.sh || {
            dump_logs
            exit 1
          }
          MYSQL=mariadb PORT="$PORT" ./scripts/test-wordpress-local-dev.sh || {
            dump_logs
            exit 1
          }
          OUT_DIR="$RUNNER_TEMP/durability" PORT=3322 MYSQL=mariadb \
            ./scripts/test-durability-recovery.sh || {
              dump_logs
              exit 1
            }

      - name: Package
        run: |
          ./scripts/package-release.sh \
            "${{ inputs.tag }}" \
            linux-x86_64 \
            target/release/wasmtime-mariadb

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.tag }}" \
            dist/wasmtime-mariadb-linux-x86_64.tar.gz \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

  macos-aarch64:
    name: Build macos-aarch64
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Download MariaDB wasm release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p release-input
          gh release download "${{ inputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "mariadbd-wasm.tar.gz" \
            --dir release-input
          tar -xzf release-input/mariadbd-wasm.tar.gz -C release-input

      - name: Build Wasmtime runner
        run: |
          rustup target add aarch64-apple-darwin
          MARIADBD_WASM="$PWD/release-input/mariadbd" \
            cargo build --release --target aarch64-apple-darwin

      - name: Install mysql client
        run: |
          brew list mysql-client >/dev/null 2>&1 || brew install mysql-client

      - name: Smoke test server over TCP
        run: |
          set -euo pipefail
          dump_logs() {
            echo "::group::mariadbd-runtime.err"
            cat "$RUN_DIR/mariadbd-runtime.err" 2>/dev/null || true
            echo "::endgroup::"
            echo "::group::server.stderr"
            cat "$RUNNER_TEMP/server.stderr" 2>/dev/null || true
            echo "::endgroup::"
            echo "::group::server.stdout"
            cat "$RUNNER_TEMP/server.stdout" 2>/dev/null || true
            echo "::endgroup::"
          }
          export BIN="$PWD/target/aarch64-apple-darwin/release/wasmtime-mariadb"
          export RUN_DIR="$RUNNER_TEMP/wasmtime-mariadb-run"
          export PORT=3320
          export WASMTIME_MARIADB_SOCKET_TRACE=1
          ./scripts/run-server.sh >"$RUNNER_TEMP/server.stdout" 2>"$RUNNER_TEMP/server.stderr" &
          server_pid=$!
          cleanup() {
            kill "$server_pid" 2>/dev/null || true
            wait "$server_pid" 2>/dev/null || true
          }
          trap cleanup EXIT
          for i in $(seq 1 60); do
            if grep -q 'ready for connections' "$RUN_DIR/mariadbd-runtime.err" 2>/dev/null; then
              break
            fi
            if ! kill -0 "$server_pid" 2>/dev/null; then
              dump_logs
              exit 1
            fi
            sleep 1
          done
          grep -q 'ready for connections' "$RUN_DIR/mariadbd-runtime.err"
          python3 scripts/bench-tcp.py --host 127.0.0.1 --port "$PORT" --user root --clients 1 --rows 5 --batch-size 5 || {
            dump_logs
            exit 1
          }
          MYSQL="$(brew --prefix mysql-client)/bin/mysql" PORT="$PORT" ./scripts/test-mysql-client.sh || {
            dump_logs
            exit 1
          }
          MYSQL="$(brew --prefix mysql-client)/bin/mysql" PORT="$PORT" ./scripts/test-wordpress-local-dev.sh || {
            dump_logs
            exit 1
          }
          OUT_DIR="$RUNNER_TEMP/durability" PORT=3322 \
            MYSQL="$(brew --prefix mysql-client)/bin/mysql" \
            MYSQL_ADMIN="$(brew --prefix mysql-client)/bin/mysqladmin" \
            ./scripts/test-durability-recovery.sh || {
              dump_logs
              exit 1
            }

      - name: Package
        run: |
          ./scripts/package-release.sh \
            "${{ inputs.tag }}" \
            macos-aarch64 \
            target/aarch64-apple-darwin/release/wasmtime-mariadb

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.tag }}" \
            dist/wasmtime-mariadb-macos-aarch64.tar.gz \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
